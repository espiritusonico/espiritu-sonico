<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espíritu Sónico</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Marcellus+SC&family=Raleway:wght@300;400;700&display=swap');
        
        body {
            font-family: 'Marcellus SC', serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #2a004e, #6a1b9a);
            color: #fff;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        .logo {
            width: 120px;
            height: auto;
            margin-bottom: 20px;
        }
        .button {
            display: inline-block;
            padding: 15px 30px;
            margin-top: 20px;
            background-color: #8e24aa;
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .button:hover {
            background-color: #ab47bc;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="Espíritu Sónico" class="logo">
        <h1>Espíritu Sónico te abre sus alas</h1>
        <p>Un viaje sensorial, donde el sonido se vuelve guía hacia lo sagrado y lo invisible.</p>
        <a href="#" class="button">Descargar App</a>
    </div>
</body>
</html>
